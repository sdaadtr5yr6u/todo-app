<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待办事项</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #f5e7ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 16px;
        }

        .container {
            width: 100%;
            max-width: 520px;
        }

        h1 {
            text-align: center;
            color: #1a73e8;
            font-size: 28px;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        .input-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .input-bar input {
            flex: 1;
            min-width: 180px;
            padding: 12px 16px;
            border: 2px solid #d0e3f9;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }

        .input-bar select {
            padding: 12px 12px;
            border: 2px solid #d0e3f9;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
            cursor: pointer;
        }

        .input-bar select:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
        }

        .input-bar button {
            padding: 12px 22px;
            background: #1a73e8;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            white-space: nowrap;
        }

        .input-bar button:hover {
            background: #155ab6;
            box-shadow: 0 4px 12px rgba(26, 115, 232, 0.3);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            font-size: 14px;
            color: #5f6b7a;
        }

        .stats span {
            background: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }

        .clear-btn {
            background: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            color: #e53e3e;
            cursor: pointer;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            transition: background 0.2s, box-shadow 0.2s;
        }

        .clear-btn:hover {
            background: #fff5f5;
            box-shadow: 0 2px 8px rgba(229, 62, 62, 0.15);
        }

        .task-list {
            list-style: none;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .task-item:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
        }

        .task-item input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #1a73e8;
            cursor: pointer;
            flex-shrink: 0;
        }

        .task-item .text {
            flex: 1;
            font-size: 16px;
            color: #2c3e50;
            word-break: break-word;
            transition: color 0.2s;
        }

        .task-item.done .text {
            text-decoration: line-through;
            color: #a0aec0;
        }

        .task-item .delete-btn {
            background: none;
            border: none;
            color: #cbd5e0;
            font-size: 20px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .task-item .delete-btn:hover {
            color: #e53e3e;
            background: #fff5f5;
        }

        .priority {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            flex-shrink: 0;
        }

        .priority.high {
            background: #fee2e2;
            color: #dc2626;
        }

        .priority.medium {
            background: #fef3c7;
            color: #d97706;
        }

        .priority.low {
            background: #dcfce7;
            color: #16a34a;
        }

        .task-item .edit-btn {
            background: none;
            border: none;
            color: #cbd5e0;
            font-size: 18px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 8px;
            transition: color 0.2s, background 0.2s;
            flex-shrink: 0;
        }

        .task-item .edit-btn:hover {
            color: #1a73e8;
            background: #eff6ff;
        }

        .edit-input {
            flex: 1;
            padding: 6px 10px;
            border: 2px solid #1a73e8;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item {
            animation: fadeIn 0.25s ease;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📋 我的待办清单</h1>
        <div class="input-bar">
            <input type="text" id="taskInput" placeholder="今天要做什么？" />
            <select id="prioritySelect">
                <option value="medium">中优先级</option>
                <option value="high">高优先级</option>
                <option value="low">低优先级</option>
            </select>
            <button id="addBtn">➕ 添加任务</button>
        </div>
        <div class="stats">
            <span id="pending">未完成：0</span>
            <span id="completed">已完成：0</span>
            <button id="clearBtn" class="clear-btn">🗑️ 清空已完成</button>
            <button id="clearAllBtn" class="clear-btn">🗑️ 全部清空</button>
        </div>
        <ul class="task-list" id="taskList"></ul>
    </div>

    <script>
        const STORAGE_KEY = 'todo_tasks';

        function loadTasks() {
            try {
                return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        }

        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        let tasks = loadTasks();

        const taskInput = document.getElementById('taskInput');
        const prioritySelect = document.getElementById('prioritySelect');
        const addBtn = document.getElementById('addBtn');
        const taskList = document.getElementById('taskList');
        const pendingEl = document.getElementById('pending');
        const completedEl = document.getElementById('completed');
        const clearBtn = document.getElementById('clearBtn');
        const clearAllBtn = document.getElementById('clearAllBtn');

        function render() {
            taskList.innerHTML = '';
            if (tasks.length === 0) {
                taskList.innerHTML = '<li class="empty">📭 暂无任务，添加一个新任务开始你的一天吧！</li>';
            } else {
                tasks.forEach((task, index) => {
                    const li = document.createElement('li');
                    li.className = 'task-item' + (task.done ? ' done' : '');

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.checked = task.done;
                    checkbox.addEventListener('change', () => toggleTask(index));

                    const prioritySpan = document.createElement('span');
                    prioritySpan.className = 'priority ' + (task.priority || 'medium');
                    prioritySpan.textContent = getPriorityText(task.priority);

                    const span = document.createElement('span');
                    span.className = 'text';
                    span.textContent = task.text;

                    const editBtn = document.createElement('button');
                    editBtn.className = 'edit-btn';
                    editBtn.innerHTML = '✏️';
                    editBtn.addEventListener('click', () => startEdit(index));

                    const delBtn = document.createElement('button');
                    delBtn.className = 'delete-btn';
                    delBtn.innerHTML = '✕';
                    delBtn.addEventListener('click', () => deleteTask(index));

                    li.appendChild(checkbox);
                    li.appendChild(prioritySpan);
                    li.appendChild(span);
                    li.appendChild(editBtn);
                    li.appendChild(delBtn);
                    taskList.appendChild(li);
                });
            }
            updateStats();
        }

        function getPriorityText(priority) {
            switch (priority) {
                case 'high': return '高';
                case 'medium': return '中';
                case 'low': return '低';
                default: return '中';
            }
        }

        function updateStats() {
            const doneCount = tasks.filter(t => t.done).length;
            pendingEl.textContent = '未完成：' + (tasks.length - doneCount);
            completedEl.textContent = '已完成：' + doneCount;
        }

        function addTask() {
            const text = taskInput.value.trim();
            if (!text) return;
            const priority = prioritySelect.value || 'medium';
            tasks.push({ text, done: false, priority });
            saveTasks(tasks);
            taskInput.value = '';
            prioritySelect.value = 'medium';
            render();
        }

        function toggleTask(index) {
            tasks[index].done = !tasks[index].done;
            saveTasks(tasks);
            render();
        }

        function deleteTask(index) {
            tasks.splice(index, 1);
            saveTasks(tasks);
            render();
        }

        function startEdit(index) {
            const task = tasks[index];
            const li = taskList.children[index];
            const textSpan = li.querySelector('.text');
            const currentText = textSpan.textContent;

            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'edit-input';
            input.value = currentText;

            textSpan.replaceWith(input);
            input.focus();
            input.select();

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    finishEdit(index, input.value, li);
                } else if (e.key === 'Escape') {
                    cancelEdit(index, li);
                }
            });

            input.addEventListener('blur', () => {
                finishEdit(index, input.value, li);
            });
        }

        function finishEdit(index, newText, li) {
            const trimmedText = newText.trim();
            if (trimmedText) {
                tasks[index].text = trimmedText;
                saveTasks(tasks);
            }
            render();
        }

        function cancelEdit(index, li) {
            render();
        }

        function clearCompleted() {
            tasks = tasks.filter(t => !t.done);
            saveTasks(tasks);
            render();
        }

        function clearAll() {
            if (tasks.length === 0) return;
            if (confirm('确定要清空所有任务吗？此操作不可恢复！')) {
                tasks = [];
                saveTasks(tasks);
                render();
            }
        }

        addBtn.addEventListener('click', addTask);
        clearBtn.addEventListener('click', clearCompleted);
        clearAllBtn.addEventListener('click', clearAll);
        taskInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') addTask();
        });

        render();
    </script>
</body>

</html>
